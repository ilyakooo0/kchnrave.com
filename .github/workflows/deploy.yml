name: Build and deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      S3_BUCKET: kchnrave.com8
      S3_ENDPOINT: s3.ru-7.storage.selcloud.ru
      AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ru-1
      AWS_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
    steps:
      - uses: actions/checkout@v4

      - name: Install htmlang
        run: |
          curl -fsSL -o /usr/local/bin/htmlang \
            https://github.com/ilyakooo0/htmlang/releases/latest/download/htmlang-linux-x86_64
          chmod +x /usr/local/bin/htmlang

      - name: Build
        run: htmlang build

      - name: Upload to S3
        run: |
          aws s3 sync out/ "s3://${S3_BUCKET}/" \
            --endpoint-url "$S3_ENDPOINT" \
            --delete \
            --exclude "*.map"
